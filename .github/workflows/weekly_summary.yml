name: Resumen ejecutivo semanal PGP

on:
  schedule:
    # Lunes 12:00 UTC ~= 08:00 hora Chile (UTC-4, sin horario de verano).
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt
        # No se necesita "playwright install chromium" aquí: este workflow no
        # abre navegador, solo necesita que el paquete playwright exista para
        # poder importar scraper.py sin que falle.

      - name: Enviar resumen semanal
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python weekly_summary.py
