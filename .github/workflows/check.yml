name: Revisar proyectos PGP

on:
  schedule:
    # Horarios en UTC. Chile continental usa UTC-4 (sin horario de verano desde 2019).
    # 04:00, 08:00, 12:00, 16:00, 20:00, 00:00 UTC ~= 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 hora Chile.
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ejecutar scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scraper.py

      - name: Commit y push de resultados
        run: |
          git config user.name "pgp-bot"
          git config user.email "pgp-bot@users.noreply.github.com"
          git add data docs
          git diff --quiet --cached || git commit -m "Actualiza estado de proyectos PGP"
          git push
